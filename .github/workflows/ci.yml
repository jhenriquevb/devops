name: CI Pipeline — DevOps na Prática

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint e Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8

      - name: Lint com flake8
        run: |
          flake8 app/ --max-line-length=88 --exclude=app/tests/__init__.py

      - name: Executar testes com cobertura
        run: |
          pytest app/tests/ -v --cov=app --cov-report=term-missing

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  security-scan:
    name: Varredura de Segurança
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Bandit (análise de segurança)
        run: pip install bandit

      - name: Executar análise de segurança
        run: bandit -r app/ -ll
