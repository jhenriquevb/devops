name: CI/CD Pipeline — DevOps na Prática

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── CI: Lint e Testes ─────────────────────────────────────────────────────
  lint-and-test:
    name: Lint e Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8

      - name: Lint com flake8
        run: |
          flake8 app/ --max-line-length=88 --exclude=app/tests/__init__.py

      - name: Executar testes com cobertura
        run: |
          pytest app/tests/ -v --cov=app --cov-report=term-missing

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── CI: Segurança ────────────────────────────────────────────────────────
  security-scan:
    name: Varredura de Segurança
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Bandit (análise de segurança)
        run: pip install bandit

      - name: Executar análise de segurança
        run: bandit -r app/ -ll

  # ── CD: Build e Push da Imagem Docker ────────────────────────────────────
  build-and-push:
    name: Build e Push Docker
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── CD: Deploy na EC2 ───────────────────────────────────────────────────
  deploy:
    name: Deploy na EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login no GHCR
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull da imagem mais recente
            docker pull ghcr.io/${{ github.repository }}:latest

            # Parar container antigo (se existir)
            docker stop devops-fase1-app || true
            docker rm devops-fase1-app || true

            # Subir novo container
            docker run -d \
              --name devops-fase1-app \
              --restart unless-stopped \
              -p 5000:5000 \
              ghcr.io/${{ github.repository }}:latest

            # Limpar imagens antigas
            docker image prune -f
