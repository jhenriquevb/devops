services:
  app:
    build:
      context: .
      target: production
    container_name: devops-fase1-app
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      - FLASK_ENV=production
